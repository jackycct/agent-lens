name: agent-lens
version: 0.2.0
description: Measurement and evidence layer for agentic coding experiments
author: jackycct
license: MIT
type: hybrid
targets:
  - claude
  - codex
  - copilot
  - gemini
  - opencode
includes:
  - .apm/instructions/
  - .apm/skills/
dependencies:
  apm: []
  mcp: []
  lsp: []
scripts:
  start: "agent-lens --help"
  record: "agent-lens run record --metadata {metadata} --telemetry {telemetry}"
  compare: "agent-lens compare {baseline} {candidate}"
  report: "agent-lens report --summary {summary}"
policy:
  fetch_failure_default: block
x-agent-lens:
  role: measurement
  metrics:
    - wall_time
    - tool_calls
    - files_read
    - token_input
    - token_output
    - tests_passed
    - accuracy_score
