name: avionics-flight-recorder
version: 0.2.0
description: Avionics Flight Recorder evidence and observability for agentic coding experiments
author: jackycct
license: MIT
type: hybrid
targets:
  - claude
  - codex
  - copilot
  - gemini
  - opencode
includes:
  - .apm/instructions/
  - .apm/skills/
dependencies:
  apm: []
  mcp: []
  lsp: []
scripts:
  start: "flight-recorder --help"
  record: "flight-recorder run record --metadata {metadata} --telemetry {telemetry}"
  compare: "flight-recorder compare {baseline} {candidate}"
  report: "flight-recorder report --summary {summary}"
policy:
  fetch_failure_default: warn
x-avionics-flight-recorder:
  role: measurement
  metrics:
    - wall_time
    - tool_calls
    - files_read
    - token_input
    - token_output
    - tests_passed
    - accuracy_score
